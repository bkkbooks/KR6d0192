body:
  text: 唐國清沙門湛然撰夫禮懺法世雖同效事儀運想多不周旋或粗讀懺文半不通利或推力前拒理觀一無效精進之風闕入門之緒故言勤修苦行非涅槃因但禮念軌儀文非不委以散情昏重想運難成予因天台再有詳補撮覽樞總使隨言作念隨念成想一一瞻視如對目前庶時刻不虛事法成辦依本文總歷十法結要事理初嚴淨道場如無別屋亦可同間絕無己物方可外求二淨身新衣舊衣新染並得若無此二澣舊勝者三三業供養若總禮三寶未須一一隨方想念但想己身及十方諸佛實相理體本無能所故無能禮所禮想此無能所名法界海願諸眾生同見此理名為同入次運香唱至受用作佛事竟次生想念不起此心能運到十方故云一念想曰願此香華遍十方以為微妙光明臺諸天音樂天寶香諸天餚膳天寶衣不可思議妙法塵一一塵出一切塵一一塵出一切法旋轉無閡互莊嚴遍至一切三寶前十方法界三寶前皆有我身修供養一一皆悉遍法界彼彼無雜無障閡盡未來際作佛事普熏法界諸眾生蒙熏皆發菩提心同入無生證佛智請佛我三業性如虛空釋迦牟尼亦如是不起真際為眾生與眾俱來受供養次請佛菩薩但改牟尼及形相來處五歎佛偈前一一別想己身在三寶前立次口宣偈隨聲運想我之身心本無生滅故雖稱歎如影如響六禮佛當唱一心時先專至敬禮為事一心次想能所為理一心應想曰能禮所禮性空寂感應道交難思議我此道場如帝珠釋迦牟尼影現中我身影現如來前頭面接足歸命禮多寶佛多寶如來影現中我身影現多寶前餘同上想分身分身諸佛亦同上想東方諸佛東方諸佛影現中我皆影現諸佛前乃至十方一一皆爾三世諸佛乃至過現未來並同上想舍利形像等諸佛法身如虛空化事住世難思議我皆影現化事前一一皆悉歸命禮妙法真空法界如虛空常住法寶難思議我皆影現法寶前莫不皆悉歸命禮諸菩薩彼一一菩薩影現中乃至下方亦如是舍利弗等先想聲聞皆是本來諸佛今從初說故云聲聞普賢菩薩為滅障故接足禮餘同上普為我及眾生無始常為三業六根重罪所障不見諸佛不知出要但順生死不知妙理我今雖知猶與一切眾生同為一切重罪所障今對普賢十方諸佛前普為眾生歸命懺悔惟願加護令障消滅七懺悔應運逆順十心云我與眾生無始來今由愛見故內計我人外加惡友不隨喜他一毫之善唯遍三業廣作眾罪事雖不廣惡心遍布晝夜相續無有間斷覆諱過失不欲人知不畏惡道無慚無愧撥無因果故於今日對十方佛普賢大師深信因果生重慚愧生大怖畏發露懺悔斷相續心發菩提心斷惡修善勤策三業翻昔重過隨喜凡聖一毫之善念十方佛有大福慧能救拔我及諸眾生從二死海置三德岸從無始來不知諸法本性空寂廣造眾惡今知空寂為求菩提為眾生故廣修諸善遍斷眾惡惟願普賢慈悲攝受次懺六根至文並須略知文相含於逆順十種心相縱有闕略在四悔中於菩提中見不清淨等是橫計我人毘盧遮那是觀罪性空一切世尊是念十方佛後四悔中有發隨喜心以是因緣令畢竟清淨是斷相續心歸向普賢及一切世尊是為眾生發菩提心一一悔文皆具三業是修功補過等說過等是發露過失當墮惡道生大怖畏等是怖畏惡道及生慚愧信因果等凡宣悔詞須加事想破於愛心至觀罪性空總想事理悔於見心若欲更略眼耳鼻三根亦可或時用若舌身意三根是業故不得全略前三根縱略並使不失逆順十心大意即得勸請十方諸佛以道眼力故知我見我勸請諸佛唯願久住轉正法輪所在生處常能勸請隨喜十方凡聖一毫之善我皆隨喜福德能令見者生喜是故我喜迴向無始來時乃至今日盡未來際一毫之善及以懺悔勸請隨喜皆同法界與諸眾生共成佛道發願大體須存滅罪除障開顯法門滿四弘誓餘者皆須順於菩提行道欲行時更須正立想此道場猶如法界十方三寶畟塞虛空以次回身旋遶法座想十方三寶心性寂滅影現十方經聲如響心想如夢梵聲亦然三歸一一各想三處三寶與頂禮俱運初文雖即直云十方意亦兼於三處若從懺悔已下凡云禮三寶者皆須一一別起三想頭三叩地一十方三寶二法華經中一切三寶三普賢大師對此三處求懺悔等又凡散華皆於言前散華之時想三寶及普賢上想已次宣懺悔等詞至後文中云散華等者心指前所散之華若焚香者送法座爐亦應想身各送爐遍至十方一一法華經前乃至普熏一切三寶若焚手爐但先添香次執爐已隨事起想然後口宣詞句坐禪文略應如止觀十法成乘等行法華懺黃昏五更時促則此略文我某甲及法界眾生從無始世來無明所覆顛倒迷惑而由六根三業不善廣造十惡四重五逆乃至十重四十八輕無量無邊說不可盡十方諸佛常在世間法音不絕妙香充塞法味盈空放淨光明照觸一切常住妙理遍滿虛空我無始來六根內盲三業昏暗不見不聞不覺不知以是因緣長流生死經歷惡道百千萬劫永無出期經云釋迦如來名毘盧遮那遍一切處是故當知一切諸法無非佛法而我不了隨無明流是則於菩提中見不清淨於解脫中而起纏縛今始覺悟今始改悔生大慚愧生大怖畏誦持大乘三業供養歸向普賢菩薩及一切世尊燒香散華發露懺悔六根三業所作永斷相續不復更造以是因緣今我與法界眾生三業六根無始所作現作當作自作教他見聞隨喜若憶不憶若識不識若疑不疑若覆若露畢竟清淨懺悔已歸命禮三寶
